# ── Render Blueprint (Infrastructure as Code) ──────────────────
# Deploy both backend and frontend from a single repo.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo — Render auto-detects this file
#   4. Set the `sync: false` env vars manually in the dashboard

services:
  # ─── Backend: Django API ─────────────────────────────────────
  - type: web
    name: dicthero-api
    runtime: python
    region: singapore  # Closest to India
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/game/start/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set this to your Vercel frontend URL, e.g. https://dicthero.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Set this to your Vercel frontend URL, e.g. https://dicthero.vercel.app
      - key: GEMINI_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.6"

  # ─── Frontend: Vite Static Site (Alternative to Vercel) ──────
  - type: web
    name: dicthero
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend URL, e.g. https://dicthero-api.onrender.com/api
